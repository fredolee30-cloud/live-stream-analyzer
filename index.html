<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播文稿分析工具</title>
    <!-- 导出 PDF 所需的库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- 图表库 Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* API Key 设置 */
        .api-setting {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .api-setting input {
            flex: 1;
            min-width: 300px;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .api-setting input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 文本输入区 */
        .textarea-container {
            position: relative;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .char-count {
            text-align: right;
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }

        /* 分析结果 */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }

        .result-card.compliance {
            border-left-color: #ff6b6b;
        }

        .result-card.quality {
            border-left-color: #51cf66;
        }

        .result-card.suggestions {
            border-left-color: #fcc419;
        }

        .result-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
        }

        .result-value.success { color: #51cf66; }
        .result-value.warning { color: #fcc419; }
        .result-value.danger { color: #ff6b6b; }

        .score-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(#51cf66 0deg, #51cf66 0deg, #e0e0e0 0deg, #e0e0e0 360deg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px auto;
        }

        .score-inner {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 600;
        }

        /* 详细报告 */
        .report-section {
            margin-top: 20px;
        }

        .report-section h3 {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e0e0e0;
        }

        .report-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .report-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .report-item-title {
            font-weight: 500;
            color: #333;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-danger {
            background: #ffe3e3;
            color: #c92a2a;
        }

        .badge-warning {
            background: #fff9db;
            color: #e67700;
        }

        .badge-success {
            background: #d3f9d8;
            color: #2b8a3e;
        }

        .report-item-content {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .highlight {
            background: #fff3bf;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 隐藏/显示 */
        .hidden {
            display: none;
        }

        /* 提示框 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            background: #ff6b6b;
        }

        .toast.success {
            background: #51cf66;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 维度评分条 */
        .dimension-bar {
            margin-bottom: 12px;
        }

        .dimension-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .bar-container {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .bar-fill.macro { background: linear-gradient(90deg, #667eea, #764ba2); }
        .bar-fill.tech { background: linear-gradient(90deg, #51cf66, #20c997); }
        .bar-fill.commodity { background: linear-gradient(90deg, #ffd43b, #fab005); }
        .bar-fill.allocation { background: linear-gradient(90deg, #20c997, #12b886); }
        .bar-fill.education { background: linear-gradient(90deg, #339af0, #2185d0); }
        .bar-fill.interaction { background: linear-gradient(90deg, #e599f7, #be4bdb); }
        .bar-fill.logic { background: linear-gradient(90deg, #fcc419, #fab005); }
        .bar-fill.data { background: linear-gradient(90deg, #339af0, #2185d0); }
        .bar-fill.need { background: linear-gradient(90deg, #ff6b6b, #fa5252); }
        .bar-fill.argument { background: linear-gradient(90deg, #f06595, #e64980); }
        .bar-fill.persuasion { background: linear-gradient(90deg, #cc5de8, #be4bdb); }
        .bar-fill.practical { background: linear-gradient(90deg, #4dabf7, #339af0); }
        .bar-fill.framework { background: linear-gradient(90deg, #63e6be, #38d9a9); }
        .bar-fill.clarity { background: linear-gradient(90deg, #ffd43b, #fab005); }
        .bar-fill.case { background: linear-gradient(90deg, #20c997, #12b886); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 直播文稿分析工具</h1>
            <p>基于 AI 的直播内容分析 - 主题识别 | 合规检测 | 质量评估</p>
        </header>

        <!-- API Key 设置 -->
        <div class="card">
            <div class="card-title">⚙️ 配置</div>
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; color: #666; margin-bottom: 8px;">Kimi API Key：</label>
                <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                    <input type="password" id="apiKeyInput" placeholder="请输入你的 Kimi API Key（sk-开头）" style="flex: 1; min-width: 250px; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
                    <button class="btn btn-secondary" onclick="saveApiKey()">保存</button>
                    <span id="apiKeyStatus" style="font-size: 13px;"></span>
                </div>
                <div style="margin-top: 8px; font-size: 12px; color: #999;">
                    🔑 获取 API Key: <a href="https://platform.moonshot.cn/console/api-keys" target="_blank" style="color: #667eea;">https://platform.moonshot.cn</a>
                </div>
            </div>
            <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap; padding-top: 16px; border-top: 1px solid #e0e0e0;">
                <label style="font-size: 14px; color: #666;">模型选择：</label>
                <select id="modelSelect" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #e0e0e0; font-size: 14px;" onchange="updateModelHint(); saveModel();">
                    <option value="moonshot-v1-8k">moonshot-v1-8k (约 8000 字，¥0.012/千字)</option>
                    <option value="moonshot-v1-32k" selected>moonshot-v1-32k (约 30000 字，¥0.024/千字，推荐)</option>
                    <option value="moonshot-v1-128k">moonshot-v1-128k (约 120000 字，¥0.06/千字)</option>
                    <option value="deepseek-chat">DeepSeek V3 (128k，性价比高)</option>
                    <option value="qwen-max">通义千问 Max (256k，最长上下文)</option>
                </select>
                <span id="modelHint" style="font-size: 12px; color: #999;"></span>
                <button class="btn btn-secondary" id="autoRecommendBtn" onclick="autoRecommendModel()" style="padding: 6px 12px; font-size: 12px;">📏 自动推荐</button>
            </div>
            <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #e0e0e0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                <label style="font-size: 14px; color: #666;">分析模板：</label>
                <select id="templateSelect" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #e0e0e0; font-size: 14px;" onchange="loadTemplate()">
                    <option value="">-- 选择模板 --</option>
                </select>
                <button class="btn btn-secondary" onclick="saveTemplate()">💾 保存模板</button>
                <button class="btn btn-secondary" onclick="openTemplateManager()">📋 管理模板</button>
            </div>
        </div>

        <!-- 文稿输入 -->
        <div class="card">
            <div class="card-title">📝 输入直播文稿</div>
            <div class="textarea-container">
                <textarea id="scriptText" placeholder="请粘贴直播文稿内容到这里...

示例格式：
主持人：欢迎大家来到直播间，今天我们来聊聊最近的宏观经济形势...
嘉宾：好的，我觉得可以从几个方面来看..." oninput="updateCharCount(); updateModelHint();"></textarea>
            </div>
            <div class="char-count"><span id="charCount">0</span> 字</div>
            <div style="margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
                <button class="btn btn-primary" onclick="analyzeScript()">开始分析</button>
                <button class="btn btn-secondary" onclick="clearAll()">清空</button>
                <button class="btn btn-secondary" onclick="loadSample()">加载示例</button>
                <button class="btn btn-secondary" onclick="toggleFileManager()">📁 文件管理</button>
                <button class="btn btn-secondary" onclick="toggleBatchAnalysis()">📚 批量分析</button>
            </div>
        </div>

        <!-- 批量分析 -->
        <div id="batchAnalysisSection" class="card hidden">
            <div class="card-title">📚 批量分析（最多 5 篇）</div>
            <div style="margin-bottom: 16px; padding: 16px; background: #f8f9fa; border-radius: 8px;">
                <div style="margin-bottom: 12px;">
                    <input type="file" id="batchFileInput" accept=".txt,.docx,.pdf,.md,.json" multiple style="display: none;" onchange="handleBatchFileSelect(event)">
                    <button class="btn btn-primary" onclick="document.getElementById('batchFileInput').click()">📤 选择文件（最多 5 个）</button>
                </div>
                <div id="batchFileList" style="font-size: 13px; color: #666;"></div>
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="startBatchAnalysis()" id="batchAnalyzeBtn" disabled>开始批量分析</button>
                <button class="btn btn-secondary" onclick="clearBatchFiles()">清空</button>
                <button class="btn btn-secondary" onclick="document.getElementById('batchAnalysisSection').classList.add('hidden')">关闭</button>
            </div>
            <div id="batchResults" style="margin-top: 24px;"></div>
        </div>

        <!-- 分析结果 -->
        <div id="resultsSection" class="card hidden">
            <div class="card-title">📈 分析结果</div>

            <div class="results-grid">
                <!-- 主题分析 -->
                <div class="result-card">
                    <div class="result-label">内容主题</div>
                    <div id="themeResult">-</div>
                    <div id="themeBars" style="margin-top: 16px;"></div>
                </div>

                <!-- 合规检测 -->
                <div class="result-card compliance">
                    <div class="result-label">合规检测</div>
                    <div id="complianceResult" class="result-value">-</div>
                    <div id="complianceIssues" style="margin-top: 8px; font-size: 14px; color: #666;"></div>
                </div>

                <!-- 质量评分 -->
                <div class="result-card quality">
                    <div class="result-label">内容质量</div>
                    <div class="score-circle" id="scoreCircle">
                        <div class="score-inner" id="scoreValue">-</div>
                    </div>
                    <div id="qualityLevel" style="text-align: center; font-size: 14px; color: #666;"></div>
                </div>

                <!-- 改进建议 -->
                <div class="result-card suggestions">
                    <div class="result-label">改进建议</div>
                    <div id="suggestionCount" class="result-value">-</div>
                    <div style="font-size: 14px; color: #666; margin-top: 8px;">点击查看详细</div>
                </div>
            </div>

            <!-- 详细报告 -->
            <div class="report-section">
                <h3>📋 详细分析报告</h3>
                <div id="detailedReport"></div>
            </div>

            <!-- 导出按钮 -->
            <div style="margin-top: 24px; padding-top: 20px; border-top: 2px solid #e0e0e0; display: flex; gap: 12px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="exportToWord()">📄 导出 Word</button>
                <button class="btn btn-primary" onclick="exportToPDF()">📑 导出 PDF</button>
                <button class="btn btn-secondary" onclick="copySummary()">📋 复制摘要</button>
                <button class="btn btn-secondary" onclick="createShare()" id="shareBtn" style="display: none;">🔗 创建分享</button>
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loadingSection" class="card hidden">
            <div class="loading">
                <div class="spinner"></div>
                <span>正在分析文稿内容，请稍候...</span>
            </div>
        </div>

        <!-- 文件管理 -->
        <div id="fileManagerSection" class="card hidden">
            <div class="card-title">📁 文件管理</div>
            <div style="margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap;">
                <input type="file" id="fileInput" accept=".txt,.docx,.pdf,.md,.json" style="display: none;" onchange="handleFileSelect(event)">
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📤 上传文件</button>
                <button class="btn btn-secondary" onclick="loadStoredFiles()">🔄 刷新列表</button>
                <button class="btn btn-secondary" onclick="clearAllFiles()">🗑️ 清空全部</button>
            </div>
            <div id="fileList" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        // ============================================
        //  配置区域
        // ============================================

        // 后端 API 地址（留空则使用前端模式，直接调用 Kimi API）
        const BACKEND_URL = 'https://live-stream-analyzer-production.up.railway.app';

        // 保存 API Key 到本地存储
        function saveApiKey() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (!apiKey.startsWith('sk-')) {
                showToast('API Key 格式错误，应以 sk- 开头');
                return;
            }
            localStorage.setItem('kimi_api_key', apiKey);
            document.getElementById('apiKeyStatus').innerHTML = '<span style="color: #51cf66;">✓ 已保存</span>';
            setTimeout(() => {
                document.getElementById('apiKeyStatus').innerHTML = '';
            }, 2000);
            showToast('API Key 已保存到本地', 'success');
        }

        // 保存模型选择
        function saveModel() {
            const model = document.getElementById('modelSelect').value;
            localStorage.setItem('kimi_model', model);
            updateModelHint();
        }

        // 模型配置信息
        const MODEL_CONFIGS = {
            'moonshot-v1-8k': { context: 8000, price: 0.012, name: 'Kimi 8k' },
            'moonshot-v1-32k': { context: 30000, price: 0.024, name: 'Kimi 32k' },
            'moonshot-v1-128k': { context: 120000, price: 0.06, name: 'Kimi 128k' },
            'deepseek-chat': { context: 128000, price: 0.004, name: 'DeepSeek V3' },
            'qwen-max': { context: 256000, price: 0.04, name: '通义千问 Max' }
        };

        // 更新模型提示
        function updateModelHint() {
            const model = document.getElementById('modelSelect').value;
            const config = MODEL_CONFIGS[model];
            const textLength = document.getElementById('scriptText').value.length;

            if (config) {
                const estimateCost = (textLength * config.price / 1000).toFixed(2);
                const utilization = Math.round((textLength / config.context) * 100);

                let hint = `${config.name} | 上下文：${config.context}字`;
                if (textLength > 0) {
                    hint += ` | 当前字数：${textLength} | 利用率：${utilization}%`;
                    if (textLength > config.context) {
                        hint += ' ⚠️ 超出上下文限制！';
                    } else if (utilization > 80) {
                        hint += ' ⚠️ 接近上限，建议切换更大模型';
                    }
                    hint += ` | 估算费用：¥${estimateCost}`;
                }
                document.getElementById('modelHint').textContent = hint;
            }
        }

        // 自动推荐模型
        function autoRecommendModel() {
            const textLength = document.getElementById('scriptText').value.length;

            if (textLength === 0) {
                showToast('请先输入文稿内容');
                return;
            }

            // 推荐逻辑：选择能容纳文本的最小模型
            const recommendations = [
                { model: 'moonshot-v1-8k', maxLen: 7000 },
                { model: 'moonshot-v1-32k', maxLen: 25000 },
                { model: 'deepseek-chat', maxLen: 100000 },
                { model: 'moonshot-v1-128k', maxLen: 110000 },
                { model: 'qwen-max', maxLen: 200000 }
            ];

            let recommended = 'qwen-max'; // 默认最大
            for (const rec of recommendations) {
                if (textLength <= rec.maxLen) {
                    recommended = rec.model;
                    break;
                }
            }

            document.getElementById('modelSelect').value = recommended;
            saveModel();

            const config = MODEL_CONFIGS[recommended];
            showToast(`已推荐：${config.name} (上下文 ${config.context}字)`, 'success');
        }

        // 从本地存储加载配置
        function loadConfig() {
            const savedApiKey = localStorage.getItem('kimi_api_key');
            const savedModel = localStorage.getItem('kimi_model');

            if (savedApiKey) {
                document.getElementById('apiKeyInput').value = savedApiKey;
                document.getElementById('apiKeyStatus').innerHTML = '<span style="color: #51cf66;">✓ 已配置</span>';
            }

            if (savedModel) {
                document.getElementById('modelSelect').value = savedModel;
            }
            updateModelHint();

            // 加载文件列表
            if (BACKEND_URL) {
                loadStoredFiles();
            }
        }

        // 切换文件管理器显示
        function toggleFileManager() {
            const section = document.getElementById('fileManagerSection');
            section.classList.toggle('hidden');
            if (!section.classList.contains('hidden')) {
                loadStoredFiles();
            }
        }

        // 切换批量分析显示
        function toggleBatchAnalysis() {
            const section = document.getElementById('batchAnalysisSection');
            section.classList.toggle('hidden');
        }

        // 批量分析文件存储
        let batchFiles = [];

        // 处理批量文件选择
        function handleBatchFileSelect(event) {
            const files = Array.from(event.target.files);

            if (files.length + batchFiles.length > 5) {
                showToast(`最多只能上传 5 个文件（当前已选 ${batchFiles.length} 个）`);
                return;
            }

            batchFiles = [...batchFiles, ...files].slice(0, 5);
            updateBatchFileList();
        }

        // 更新批量文件列表显示
        function updateBatchFileList() {
            const fileList = document.getElementById('batchFileList');
            if (batchFiles.length === 0) {
                fileList.innerHTML = '<div style="color: #999;">暂无选择的文件</div>';
                document.getElementById('batchAnalyzeBtn').disabled = true;
            } else {
                fileList.innerHTML = batchFiles.map((f, i) => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: white; border-radius: 6px; margin-bottom: 8px;">
                        <span>${i + 1}. ${f.name} (${(f.size / 1024).toFixed(1)} KB)</span>
                        <button class="btn btn-secondary" style="padding: 2px 8px; font-size: 12px;" onclick="removeBatchFile(${i})">删除</button>
                    </div>
                `).join('');
                document.getElementById('batchAnalyzeBtn').disabled = false;
            }
        }

        // 移除批量文件
        function removeBatchFile(index) {
            batchFiles.splice(index, 1);
            updateBatchFileList();
        }

        // 清空批量文件
        function clearBatchFiles() {
            batchFiles = [];
            document.getElementById('batchFileInput').value = '';
            updateBatchFileList();
            document.getElementById('batchResults').innerHTML = '';
        }

        // 开始批量分析
        async function startBatchAnalysis() {
            if (batchFiles.length === 0) {
                showToast('请先选择文件');
                return;
            }

            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (!apiKey || !apiKey.startsWith('sk-')) {
                showToast('请先输入并保存你的 Kimi API Key');
                return;
            }

            const model = document.getElementById('modelSelect').value;
            const batchResults = [];

            document.getElementById('batchAnalyzeBtn').disabled = true;
            document.getElementById('batchResults').innerHTML = '<div class="loading"><div class="spinner"></div><span>正在分析第 1/5 篇文稿...</span></div>';

            for (let i = 0; i < batchFiles.length; i++) {
                const file = batchFiles[i];
                document.getElementById('batchResults').innerHTML = `<div class="loading"><div class="spinner"></div><span>正在分析第 ${i + 1}/${batchFiles.length} 篇文稿：${file.name}...</span></div>`;

                try {
                    // 读取文件内容
                    const text = await readFileContent(file);

                    // 调用 API 分析
                    const prompt = buildAnalysisPrompt(text);
                    const response = await callKimiAPI(apiKey, prompt);
                    const analysis = parseAnalysisResult(response);

                    batchResults.push({
                        filename: file.name,
                        text: text,
                        analysis: analysis
                    });
                } catch (error) {
                    batchResults.push({
                        filename: file.name,
                        error: error.message
                    });
                }
            }

            // 显示结果
            displayBatchResults(batchResults);
            document.getElementById('batchAnalyzeBtn').disabled = false;
        }

        // 读取文件内容
        function readFileContent(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = reject;

                // 简单处理：如果是二进制文件，需要后端解析
                if (file.name.endsWith('.docx') || file.name.endsWith('.pdf')) {
                    reject(new Error('Word 和 PDF 文件需要通过后端 API 解析，请先上传到文件管理'));
                    return;
                }

                reader.readAsText(file, 'utf-8');
            });
        }

        // 渲染对比图表
        function renderComparisonCharts(results) {
            if (results.length === 0) return;

            // 准备数据
            const labels = results.map(r => r.filename.length > 10 ? r.filename.substring(0, 10) + '...' : r.filename);

            // 雷达图：5 个核心维度
            const radarData = {
                labels: ['需求贴合', '论述质量', '说服力', '逻辑完整', '实用价值'],
                datasets: results.map((r, i) => ({

                    pointBorderColor: '#fff',
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: getColorForIndex(i)
                }))
            };

            // 柱状图：总分对比
            const barData = {
                labels: labels,
                datasets: [{
                    label: '质量总分',

                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } }
                    }

            });

            // 渲染柱状图
            const barCtx = document.getElementById('barChart').getContext('2d');

                type: 'bar',
                data: barData,
                options: {

        function getColorForIndex(index, alpha = 1) {
            const colors = [
                `rgba(102, 126, 234, ${alpha})`,    // 蓝紫
                `rgba(81, 207, 102, ${alpha})`,     // 绿色
                `rgba(255, 107, 107, ${alpha})`,    // 红色
                `rgba(252, 196, 25, ${alpha})`,     // 黄色
                `rgba(204, 93, 232, ${alpha})`      // 紫色
            ];
            return colors[index % colors.length];
        }

        // 上传文件
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${BACKEND_URL}/api/upload`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    showToast(`文件上传成功：${result.filename} (${result.length}字)`, 'success');
                    document.getElementById('scriptText').value = result.text;
                    updateCharCount();
                    updateModelHint();
                    loadStoredFiles();
                } else if (result.action === 'need_delete') {
                    showToast(result.error, 'error');
                    // 显示文件列表让用户选择删除
                    loadStoredFiles();
                } else {
                    showToast(result.error || '上传失败', 'error');
                }
            } catch (error) {
                showToast(`上传失败：${error.message}`);
            }
        }

        // 调用 Kimi API
        async function callKimiAPI(apiKey, prompt) {
            const url = 'https://api.moonshot.cn/v1/chat/completions';

            // 使用用户选择的模型
            const model = document.getElementById('modelSelect').value;
            const textLength = prompt.length;
            console.log(`使用模型：${model} (文稿长度：${textLength})`);

            const requestBody = {
                model: model,
                messages: [
                    {
                        role: 'user',
                        content: prompt
                    }
                ],
                temperature: 0.3,
                response_format: { type: 'json_object' }
            };

            console.log('Request body:', JSON.stringify(requestBody, null, 2));

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(requestBody)
            });

            console.log('Response status:', response.status);
            console.log('Response headers:', Object.fromEntries(response.headers.entries()));

            if (!response.ok) {
                const errorText = await response.text();
                console.error('Error response:', errorText);

                let errorMessage = `HTTP ${response.status}`;
                try {
                    const errorData = JSON.parse(errorText);
                    if (errorData.error && errorData.error.message) {
                        errorMessage = errorData.error.message;
                    }
                } catch (e) {
                    errorMessage = errorText || response.statusText;
                }

                throw new Error(errorMessage);
            }

            const data = await response.json();
            console.log('API success response:', data);

            if (!data.choices || !data.choices[0] || !data.choices[0].message) {
                throw new Error('API 返回格式异常');
            }

            return data.choices[0].message.content;
        }

        // 解析分析结果
        function parseAnalysisResult(content) {
            try {
                // 尝试提取 JSON
                let jsonStr = content.trim();
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    jsonStr = jsonMatch[0];
                }

                const result = JSON.parse(jsonStr);
                return result;
            } catch (e) {
                console.error('JSON parse error:', e);
                console.error('Content:', content);
                throw new Error('API 返回结果格式异常，无法解析');
            }
        }

        // 渲染结果
        function renderResults(analysis) {
            // 存储分析结果到全局变量，供导出使用

            const themes = [
                { name: '宏观经济', weight: analysis.theme.macro_weight },

                { name: '大宗商品', weight: analysis.theme.commodity_weight },
                { name: '大类资产配置', weight: analysis.theme.allocation_weight },
                { name: '金融投教知识', weight: analysis.theme.education_weight },
                { name: '直播互动', weight: analysis.theme.interaction_weight }
            ];
            const maxTheme = themes.reduce((a, b) => a.weight > b.weight ? a : b);

            let mainTheme = '';
            if (maxTheme.weight >= 50) {
                mainTheme = `以${maxTheme.name}为主`;
            } else {
                // 找出前两个主题
                themes.sort((a, b) => b.weight - a.weight);
                mainTheme = `${themes[0].name} + ${themes[1].name}`;
            }

            themeResult.innerHTML = `
                <div class="result-value">${mainTheme}</div>
                <div style="font-size: 14px; color: #666; margin-top: 4px;">${analysis.theme.summary || ''}</div>
            `;

            const themeColors = {
                '宏观经济': 'macro',
                '科技资产': 'tech',
                '大宗商品': 'commodity',
                '大类资产配置': 'allocation',
                '金融投教知识': 'education',
                '直播互动': 'interaction'
            };

            themeBars.innerHTML = themes.map(t => `
                <div class="dimension-bar">
                    <div class="dimension-label">
                        <span>${t.name}</span>
                        <span>${t.weight}%</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar-fill ${themeColors[t.name]}" style="width: ${t.weight}%"></div>
                    </div>
                </div>
            `).join('');

            // 合规检测

            const complianceIssues = document.getElementById('complianceIssues');

                complianceResult.innerHTML = '<span class="result-value success">✅ 合规</span>';

                complianceResult.innerHTML = `<span class="result-value danger">⚠️ ${issueCount} 处风险</span>`;
                complianceIssues.textContent = analysis.compliance.summary || '';
            }

            // 质量评分
            updateScoreCircle(analysis.quality.overall_score);

            let qualityLevel = '';
            if (analysis.quality.overall_score >= 90) qualityLevel = 'S - 优秀';
            else if (analysis.quality.overall_score >= 80) qualityLevel = 'A - 良好';
            else if (analysis.quality.overall_score >= 70) qualityLevel = 'B - 中等';
            else if (analysis.quality.overall_score >= 60) qualityLevel = 'C - 合格';
            else qualityLevel = 'D - 需改进';

            document.getElementById('qualityLevel').textContent = qualityLevel;

            // 改进建议
            const suggestionCount = document.getElementById('suggestionCount');
            suggestionCount.textContent = `${analysis.suggestions?.length || 0} 条`;

            // 详细报告
            const detailedReport = document.getElementById('detailedReport');
            detailedReport.innerHTML = `
                <div class="report-item">
                    <div class="report-item-header">
                        <span class="report-item-title">📌 主题分布</span>
                        <span class="badge badge-success">主题明确</span>
                    </div>
                    <div class="report-item-content">${analysis.theme.summary}</div>
                </div>

                <div class="report-item">
                    <div class="report-item-header">
                        <span class="report-item-title">⚠️ 合规问题详情</span>
                        ${analysis.compliance.is_compliant ? '<span class="badge badge-success">无违规</span>' : '<span class="badge badge-danger">需修正</span>'}
                    </div>
                    <div class="report-item-content">
                        ${analysis.compliance.issues?.map(issue => `
                            <div style="margin-bottom: 12px; padding: 12px; background: white; border-radius: 6px;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                    <span class="badge badge-danger">${issue.type}</span>
                                    <span style="font-size: 12px; color: #999;">严重程度：${issue.severity === 'high' ? '高' : issue.severity === 'medium' ? '中' : '低'}</span>
                                </div>
                                <div style="color: #c92a2a; font-style: italic; margin-bottom: 8px;">"${issue.content}"</div>
                                <div style="color: #666; font-size: 13px;">💡 建议：${issue.suggestion}</div>
                            </div>
                        `).join('') || '<div>未发现违规内容</div>'}
                    </div>
                </div>

                <div class="report-item">
                    <div class="report-item-header">
                        <span class="report-item-title">📊 质量维度评分</span>
                    </div>
                    <div class="report-item-content">
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>需求贴合度</span>
                                <span>${analysis.quality.need_fit_score}分</span>
                            </div>
                            <div class="bar-container">
                                <div class="bar-fill need" style="width: ${analysis.quality.need_fit_score}%"></div>
                            </div>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>论述质量</span>
                                <span>${analysis.quality.argument_score}分</span>
                            </div>
                            <div class="bar-container">
                                <div class="bar-fill argument" style="width: ${analysis.quality.argument_score}%"></div>
                            </div>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>说服力</span>
                                <span>${analysis.quality.persuasion_score}分</span>
                            </div>
                            <div class="bar-container">
                                <div class="bar-fill persuasion" style="width: ${analysis.quality.persuasion_score}%"></div>
                            </div>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>逻辑完整性</span>
                                <span>${analysis.quality.logic_score}分</span>
                            </div>
                            <div class="bar-container">
                                <div class="bar-fill logic" style="width: ${analysis.quality.logic_score}%"></div>
                            </div>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>实用价值</span>
                                <span>${analysis.quality.practical_score}分</span>
                            </div>
                            <div class="bar-container">
                                <div class="bar-fill practical" style="width: ${analysis.quality.practical_score}%"></div>
                            </div>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>逻辑框架</span>
                                <span>${analysis.quality.framework_score}分</span>
                            </div>
                            <div class="bar-container">
                                <div class="bar-fill framework" style="width: ${analysis.quality.framework_score}%"></div>
                            </div>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>易懂性</span>
                                <span>${analysis.quality.clarity_score}分</span>
                            </div>
                            <div class="bar-container">
                                <div class="bar-fill clarity" style="width: ${analysis.quality.clarity_score}%"></div>
                            </div>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>数据详实度</span>
                                <span>${analysis.quality.data_score}分</span>
                            </div>
                            <div class="bar-container">
                                <div class="bar-fill data" style="width: ${analysis.quality.data_score}%"></div>
                            </div>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>案例质量</span>
                                <span>${analysis.quality.case_score}分</span>
                            </div>
                            <div class="bar-container">
                                <div class="bar-fill case" style="width: ${analysis.quality.case_score}%"></div>
                            </div>

                </div>

                ${analysis.quality.deductions?.length > 0 ? `
                <div class="report-item">
                    <div class="report-item-header">
                        <span class="report-item-title">🔧 扣分项及建议</span>
                    </div>
                    <div class="report-item-content">
                        ${analysis.quality.deductions.map(d => `
                            <div style="margin-bottom: 12px; padding: 12px; background: white; border-radius: 6px;">
                                <div style="font-weight: 500; color: #333; margin-bottom: 4px;">${d.dimension}</div>
                                <div style="color: #666; margin-bottom: 8px;">问题：${d.issue}</div>
                                <div style="color: #2b8a3e; font-size: 13px;">💡 建议：${d.suggestion}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}

                <div class="report-item">
                    <div class="report-item-header">
                        <span class="report-item-title">💡 综合改进建议</span>
                    </div>
                    <div class="report-item-content">
                        <ul style="padding-left: 20px; line-height: 1.8;">
                            ${analysis.suggestions?.map(s => `<li>${s}</li>`).join('') || '<li>暂无建议</li>'}

                    </div>
                </div>
            `;
        }

        // ============================================
        //  模板管理功能
        // ============================================

        // 加载模板列表
        function loadTemplateList() {
            const templates = getTemplates();
            const select = document.getElementById('templateSelect');
            select.innerHTML = '<option value="">-- 选择模板 --</option>';
            templates.forEach(t => {
                select.innerHTML += `<option value="${t.id}">${t.name}</option>`;
            });
        }

        // 获取所有模板
        function getTemplates() {
            const data = localStorage.getItem('analysis_templates');
            return data ? JSON.parse(data) : [];
        }

        // 保存模板
        function saveTemplate() {
            const name = prompt('请输入模板名称：');
            if (!name) return;

            const template = {
                id: Date.now().toString(),
                name: name,
                createdAt: new Date().toISOString(),
                model: document.getElementById('modelSelect').value
            };

            const templates = getTemplates();
            templates.push(template);
            localStorage.setItem('analysis_templates', JSON.stringify(templates));

            loadTemplateList();
            showToast(`模板"${name}"已保存`, 'success');
        }

        // 加载模板
        function loadTemplate() {
            const templateId = document.getElementById('templateSelect').value;
            if (!templateId) return;

            const templates = getTemplates();
            const template = templates.find(t => t.id === templateId);
            if (!template) return;

            if (template.model) {
                document.getElementById('modelSelect').value = template.model;
                updateModelHint();
            }

            showToast(`模板"${template.name}"已加载`, 'success');
        }

        // 打开模板管理器
        function openTemplateManager() {
            const templates = getTemplates();

            if (templates.length === 0) {
                showToast('暂无保存的模板');
                return;
            }

            const templateList = templates.map(t => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px;">
                    <div>
                        <div style="font-weight: 500;">${t.name}</div>
                        <div style="font-size: 12px; color: #999;">模型：${t.model || 'moonshot-v1-32k'} · ${t.createdAt}</div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-secondary" style="padding: 4px 12px; font-size: 12px;" onclick="applyTemplate('${t.id}')">应用</button>
                        <button class="btn btn-secondary" style="padding: 4px 12px; font-size: 12px; background: #ffe3e3;" onclick="deleteTemplate('${t.id}')">删除</button>
                    </div>
                </div>
            `).join('');

            // 使用 toast 显示模板列表（简化处理）
            const container = document.createElement('div');
            container.innerHTML = `
                <div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 24px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 2000; max-width: 500px; max-height: 400px; overflow-y: auto;">
                    <div style="font-size: 1.2rem; font-weight: 600; margin-bottom: 16px;">📋 模板管理</div>
                    ${templateList}
                    <button class="btn btn-secondary" onclick="this.closest('div').remove()" style="margin-top: 16px; width: 100%;">关闭</button>
                </div>
            `;
            document.body.appendChild(container);
        }

        // 应用模板
        function applyTemplate(templateId) {
            const templates = getTemplates();
            const template = templates.find(t => t.id === templateId);
            if (!template) return;

            if (template.model) {
                document.getElementById('modelSelect').value = template.model;
                updateModelHint();
            }

            document.getElementById('templateSelect').value = templateId;
            showToast(`模板"${template.name}"已应用`, 'success');
        }

        // 删除模板
        function deleteTemplate(templateId) {
            if (!confirm('确定要删除这个模板吗？')) return;

            const templates = getTemplates().filter(t => t.id !== templateId);
            localStorage.setItem('analysis_templates', JSON.stringify(templates));

            loadTemplateList();
            document.getElementById('templateSelect').value = '';
            showToast('模板已删除', 'success');
        }

        // 页面加载时恢复配置
        loadConfig();
        loadTemplateList();
    </script>
</body>
</html>
